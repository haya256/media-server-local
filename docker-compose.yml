services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./html:/usr/share/nginx/html:ro
      - ${VIDEOS_DIR:-./data/videos}:/videos:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: python:3-alpine
    command: python /app/server.py
    volumes:
      - ./api:/app:ro
      - ./data:/data
      - ${VIDEOS_DIR:-./data/videos}:/videos
    restart: unless-stopped
